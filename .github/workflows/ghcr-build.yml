name: ghcr-build

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/danaa-fastapi

jobs:
  build-and-push-fastapi:
    if: github.repository == 'BIJENG/DANAA_project'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=main-

      - name: Build and push FastAPI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/project
            export FASTAPI_IMAGE=ghcr.io/bijeng/danaa-fastapi:latest
            export COMPOSE_PROJECT_NAME=danaa_project
            docker compose -f docker-compose.prod.yml pull fastapi
            docker compose -f docker-compose.prod.yml run --rm fastapi uv run --no-sync aerich upgrade
            docker compose -f docker-compose.prod.yml stop fastapi
            docker compose -f docker-compose.prod.yml rm -f fastapi
            docker compose -f docker-compose.prod.yml up -d --no-deps fastapi
            docker image prune -af
