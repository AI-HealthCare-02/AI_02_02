name: checks

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "refactor/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --group app --group dev

      - name: Run Ruff
        run: uv run ruff check backend

      - name: Run unit tests
        run: uv run python -m pytest backend/tests/unit -q
