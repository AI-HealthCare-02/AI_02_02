services:
  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - ws
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: "Asia/Seoul"
      PGTZ: "Asia/Seoul"
    ports:
      - "${DB_EXPOSE_PORT}:${DB_PORT}"
    networks:
      - ws
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    container_name: fastapi
    build:
      context: .
      dockerfile: app/Dockerfile
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:app-${APP_VERSION}
    env_file: .env
    environment:
      DB_HOST: postgres
    command: |
      sh -c "uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./app:/app/app
      - static_volume:/app/templates
    restart: always
    ports:
      - "8000:8000"
    networks:
      - ws
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-worker:
    container_name: ai-worker
    profiles: ["ai"]
    build:
      context: .
      dockerfile: ai_worker/Dockerfile
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:ai-${AI_WORKER_VERSION}
    env_file: .env
    environment:
      DB_HOST: postgres
    restart: always
    mem_limit: 4G
    networks:
      - ws
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    container_name: nginx
    image: nginx:latest
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/vol/web/static
    ports:
      - "80:80"
    networks:
      - ws
    depends_on:
      - fastapi

volumes:
  postgres_data:
  static_volume:

networks:
  ws:
    driver: bridge
