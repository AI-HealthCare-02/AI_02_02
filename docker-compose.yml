services:
  redis:
    image: redis:alpine
    networks:
      - ws
    ports:
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: "Asia/Seoul"
    ports:
      - "${DB_EXPOSE_PORT}:${DB_PORT}"
    networks:
      - ws
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: ["-p", "${DB_PORT}"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -p ${DB_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: backend/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:app-${APP_VERSION}
    env_file: .env
    command: |
      sh -c "uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app/backend
      - static_volume:/app/templates
    restart: always
    ports:
      - "${FASTAPI_EXPOSE_PORT:-8000}:8000"
    networks:
      - ws
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-worker:
    build:
      context: .
      dockerfile: workers/ai/Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:ai-${AI_WORKER_VERSION}
    env_file: .env
    restart: always
    mem_limit: 4G
    networks:
      - ws
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gemma-runtime:
    image: vllm/vllm-openai:latest
    env_file: .env
    restart: unless-stopped
    gpus: all
    shm_size: 2g
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    ports:
      - "${GEMMA_RUNTIME_PORT:-8001}:8001"
    command: >
      --model ${LLM_MODEL:-google/gemma-4-E4B-it}
      --host 0.0.0.0
      --port 8001
      --max-model-len ${GEMMA_MAX_MODEL_LEN:-4096}
      --max-num-seqs ${GEMMA_MAX_NUM_SEQS:-1}
      --max-num-batched-tokens ${GEMMA_MAX_NUM_BATCHED_TOKENS:-2048}
      --gpu-memory-utilization ${GEMMA_GPU_MEMORY_UTILIZATION:-0.90}
      --enable-prefix-caching
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    networks:
      - ws

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/vol/web/static
    ports:
      - "${NGINX_EXPOSE_PORT:-80}:80"
    networks:
      - ws
    depends_on:
      - fastapi

volumes:
  postgres_data:
  static_volume:
  huggingface_cache:

networks:
  ws:
    driver: bridge
