# Docker 개발 전용 도구 — docker compose up -d로 자동 병합됨
# 사용법: cp docker-compose.override.example.yml docker-compose.override.yml
# 프로덕션에서는 override.yml이 없으므로 안전

services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@danaa.local
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "5050:80"
    networks:
      - ws
    depends_on:
      - postgres

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    networks:
      - ws
    depends_on:
      - redis
