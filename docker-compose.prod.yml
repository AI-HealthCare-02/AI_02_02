services:
  # 1. Redis (메시지 브로커 및 캐싱)
  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - ws
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 2. Database
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - ${DB_EXPOSE_PORT}:${DB_PORT}
    networks:
      - ws
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: ["-p", "${DB_PORT}"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -p ${DB_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. API Server (FastAPI)
  fastapi:
    container_name: fastapi
    image: ${FASTAPI_IMAGE}
    env_file: .env
    volumes:
      - static_volume:/app/templates
      - media_volume:/app/media
    restart: always
    ports:
      - "8000:8000"
    networks:
      - ws
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gemma-runtime:
    container_name: gemma-runtime
    image: vllm/vllm-openai:latest
    env_file: .env
    restart: unless-stopped
    gpus: all
    shm_size: 2g
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    ports:
      - "${GEMMA_RUNTIME_PORT:-8001}:8001"
    command: >
      --model ${LLM_MODEL:-google/gemma-4-E4B-it}
      --host 0.0.0.0
      --port 8001
      --max-model-len ${GEMMA_MAX_MODEL_LEN:-4096}
      --max-num-seqs ${GEMMA_MAX_NUM_SEQS:-1}
      --max-num-batched-tokens ${GEMMA_MAX_NUM_BATCHED_TOKENS:-2048}
      --gpu-memory-utilization ${GEMMA_GPU_MEMORY_UTILIZATION:-0.90}
      --enable-prefix-caching
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    networks:
      - ws

  # 5. Nginx (웹 서버 - 요청 리버스 프록시로 전달)
  nginx:
    container_name: nginx
    image: nginx:latest
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/vol/web/static
      - media_volume:/vol/web/media
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    networks:
      - ws
    depends_on:
      - fastapi

  # 6. certbot: SSL 인증서 발급담당
  certbot:
    image: certbot/certbot
    container_name: auto-certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 48h & wait $${!}; done;'"
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - nginx

volumes:
  postgres_data:
    name: postgres_data
  static_volume:
    name: static_volume
  media_volume:
    name: media_volume
  huggingface_cache:
    name: huggingface_cache
  certbot-conf:
    name: certbot-conf
  certbot-www:
    name: certbot-www

networks:
  ws:
    name: ws
    driver: bridge
