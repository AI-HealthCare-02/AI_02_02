services:
  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - ws
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: "Asia/Seoul"
      PGTZ: "Asia/Seoul"
    ports:
      - "${DB_EXPOSE_PORT}:${DB_PORT}"
    networks:
      - ws
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    container_name: fastapi
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:app-${APP_VERSION}
    env_file: .env
    environment:
      DB_HOST: postgres
    volumes:
      - static_volume:/app/templates
      - media_volume:/app/media
    restart: always
    ports:
      - "8000:8000"
    networks:
      - ws
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-worker:
    container_name: ai-worker
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:ai-${AI_WORKER_VERSION}
    env_file: .env
    environment:
      DB_HOST: postgres
    restart: always
    mem_limit: 4G
    networks:
      - ws
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    container_name: nginx
    image: nginx:latest
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/vol/web/static
      - media_volume:/vol/web/media
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    networks:
      - ws
    depends_on:
      - fastapi

  certbot:
    image: certbot/certbot
    container_name: auto-certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 48h & wait $${!}; done;'"
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - nginx

volumes:
  postgres_data:
    name: postgres_data
  static_volume:
    name: static_volume
  media_volume:
    name: media_volume
  certbot-conf:
    name: certbot-conf
  certbot-www:
    name: certbot-www

networks:
  ws:
    name: ws
    driver: bridge
